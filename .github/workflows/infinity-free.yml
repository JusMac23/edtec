name: Deploy to InfinityFree

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Inject real credentials safely during the build run
      - name: Inject Database Secrets
        run: |
          sed -i 's/DB_HOST_PLACEHOLDER/${{ secrets.DB_HOST }}/g' database/config.php
          sed -i 's/DB_NAME_PLACEHOLDER/${{ secrets.DB_NAME }}/g' database/config.php
          sed -i 's/DB_USER_PLACEHOLDER/${{ secrets.DB_USER }}/g' database/config.php
          sed -i 's/DB_PASS_PLACEHOLDER/${{ secrets.DB_PASS }}/g' database/config.php

      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftpupload.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: htdocs/
          exclude: |
            .env
            **/.git*
            **/.git*/**
            .github/**